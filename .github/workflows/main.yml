name: Deploy to EC2

on:
  push:
    branches:
      - student

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /var/www/html/inplace
            git pull origin student
            sudo systemctl restart apache2
          EOF
